<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Calgary YYC 3D Radar - Integrated Universal Version</title>
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/@deck.gl/extensions@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background: #111; overflow: hidden; font-family: sans-serif; }
    #map { width: 100vw; width: 100dvw; height: 100vh; height: 100dvh; position: absolute; top: 0; left: 0; pointer-events: auto;}
    
    #control-panel {
      position: absolute; top: 40px; left: 20px; z-index: 100;
      background: rgba(20, 20, 20, 0.85); border-radius: 8px;
      color: #fff; width: 220px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      overflow: hidden; 
    }

    .panel-header {
      padding: 10px 15px; background: rgba(40, 40, 40, 0.9); cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; font-weight: bold; letter-spacing: 0.5px; border-bottom: 1px solid #333;
    }
    .panel-header:hover { background: #444; }
    .panel-content { padding: 15px; max-height: 80vh; overflow-y: auto; transition: all 0.4s; }
    #control-panel.collapsed .panel-content { max-height: 0; padding-top: 0; padding-bottom: 0; border: none; }
    .toggle-icon { transition: transform 0.4s; font-size: 11px; color: #0076ff; }
    #control-panel.collapsed .toggle-icon { transform: rotate(180deg); }

    .panel-section { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    .panel-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .panel-section label { display: block; font-size: 12px; color: #aaa; margin-bottom: 1px; }
    .btn-group { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 4px; 
      width: 100%; 
    }
    
    .btn {
      flex: 1; background: #333; color: #fff; border: none; padding: 4px 0;
      border-radius: 4px; cursor: pointer; font-size: 11px; transition: 0.2s; text-align: center;
    }
    .btn.active { background: #0076ff; font-weight: bold; }
    
    .rwy-btn { 
      width: 100%; 
      margin-top: 0; 
      background: #222; 
      border: 1px solid #444; 
      font-weight: normal; 
    }
    .rwy-btn.active { background: #0076ff; color: #fff; font-weight: bold; border-color: #0076ff; }

    .btn.save-btn { 
      background: #dc3545; color: #fff; font-weight: bold; font-size: 12px; 
      margin: 5px auto 0 auto; padding: 5px 0; display: block; width: 75%; border-radius: 4px;
    }
    .btn.save-btn:hover { background: #bd2130; }
    select { width: 100%; background: #333; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 4px; font-size: 11px; }

    input[type=range] { width: 100%; cursor: pointer; }

    .control-btn {
      position: absolute; right: 20px; z-index: 100;
      background: rgba(20, 20, 20, 0.3); color: #0076ff; border: 1px solid #0076ff;
      padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
      box-shadow: 0 0 10px rgba(0, 118, 255, 0.3); transition: all 0.2s; width: 90px; text-align: center;
    }
    .control-btn:hover { background: #0076ff; color: #fff; box-shadow: 0 0 15px rgba(0, 118, 255, 0.3); }
    #compass-btn { top: 40px; }
    #topview-btn { top: 95px; }
    #yyc-btn { top: 150px; }
    #yyc-btn.active { background: #0076ff; color: #fff; box-shadow: 0 0 15px rgba(0, 118, 255, 0.8); }

    .control-btn:active, #yyc-btn:active {
      background: #ff00ff !important; border-color: #ff00ff !important; color: #000000 !important;
      box-shadow: 0 0 15px #ff00ff !important; transition: none !important;
    }
    
    #bottom-timeline-panel {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      width: 85vw; max-width: 1200px; z-index: 100;
      box-sizing: border-box;
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      opacity: 1.0 !important; 
      padding: 25px 0 10px 0; 
    }

    #bottom-timeline-panel.hidden { display: none !important; }

    .timeline-header-grid { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .timeline-title { font-size: 12px; font-weight: bold; color: #0076ff; letter-spacing: 1px; }
    .timeline-selection-display {
      font-size: 14px; font-weight: bold; color: #0076ff; background: rgba(0, 118, 255, 0.1);
      padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(0, 118, 255, 0.3);
    }
    .slider-wrapper { padding: 0 10px; margin-bottom: 8px; }
    
    .timeline-edges { display: flex; justify-content: space-between; margin-top: 12px; }
    .timeline-edges span { 
      font-family: monospace; font-size: 14px; font-weight: bold; color: #ffffff;           
      background: rgba(10, 10, 10, 0.7); padding: 4px 10px; border-radius: 4px;
      border: 1px solid rgba(0, 118, 255, 0.2); box-shadow: 0 0 10px rgba(0, 118, 255, 0.2);
      position: relative; margin-top: 0px; 
    }

    #label-left-time::before {
      content: ''; position: absolute; top: -15px; left: 5px;       
      border-width: 0 6px 15px 6px; border-style: solid;
      border-color: transparent transparent rgba(10, 10, 10, 0.7) transparent; 
      display: block; width: 0; height: 0;
    }

    #label-right-time::before {
      content: ''; position: absolute; top: -15px; right: 5px;      
      border-width: 0 6px 15px 6px; border-style: solid;
      border-color: transparent transparent rgba(10, 10, 10, 0.7) transparent; 
      display: block; width: 0; height: 0;
    }
    
    #bottom-timeline-panel .noUi-target { background: #222; border: 1px solid #444; border-radius: 6px; height: 10px; }
    #bottom-timeline-panel .noUi-connect { background: linear-gradient(90deg, #0056b3, #0076ff); }
    #bottom-timeline-panel .noUi-handle {
      width: 20px !important; height: 20px !important; right: -10px !important; top: -6px !important;
      background: #0076ff; border: 2px solid #fff; border-radius: 4px;
      box-shadow: 0 0 8px rgba(0,118,255,1); cursor: pointer; transition: transform 0.1s;
    }
    #bottom-timeline-panel .noUi-handle:hover { transform: scale(1.15); background: #248aff; }
    #bottom-timeline-panel .noUi-handle:before, #bottom-timeline-panel .noUi-handle:after { display: none; }

    #bottom-timeline-panel .noUi-tooltip {
      display: block; background: #0076ff; color: #fff; border: 1px solid #fff; border-radius: 4px;
      padding: 4px 8px; font-size: 12px; font-weight: bold; font-family: monospace; bottom: 24px; 
      box-shadow: 0 0 8px rgba(0, 118, 255, 0.6); white-space: nowrap;
    }
    #bottom-timeline-panel .noUi-tooltip:after {
      content: ''; position: absolute; border-width: 5px 5px 0; border-style: solid;
      border-color: #0076ff transparent; display: block; width: 0; bottom: -5px; left: 50%; transform: translateX(-50%);
    }

    #detail-panel {
      position: absolute; top: 210px; right: 20px; z-index: 100;
      background: rgba(20, 20, 20, 0.75); border-radius: 8px;
      color: #fff; width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      border: 1px solid rgba(0, 118, 255, 0.3); display: none; 
    }
    .detail-header {
      padding: 10px 15px; background: rgba(0, 118, 255, 0.2); font-size: 13px; font-weight: bold;
      letter-spacing: 0.5px; border-bottom: 1px solid rgba(0, 118, 255, 0.4); display: flex; justify-content: space-between;
    }
    .detail-close { cursor: pointer; color: #aaa; }
    .detail-close:hover { color: #fff; }
    .detail-content { padding: 15px; font-family: monospace; font-size: 12px; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .detail-label { color: #ffffff; }
    .detail-value { color: #00ffc4; font-weight: bold; }
    .status-active { color: #00ff66; }
    .status-lost { color: #ff3366; }
  </style>
</head>
<body>

  <div id="detail-panel">
    <div class="detail-header">
      <span>✈️ AIRCRAFT INFO</span>
      <span class="detail-close" onclick="closeDetailPanel()">✖</span>
    </div>
    <div class="detail-content">
      <div class="detail-row"><span class="detail-label">ICAO Hex:</span><span id="det-hex" class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">Callsign:</span><span id="det-callsign" class="detail-value" style="color:#fff;">-</span></div>
      <div class="detail-row"><span class="detail-label">Airline:</span><span id="det-airline" class="detail-value" style="color:#ffb000;">-</span></div>
      <div class="detail-row"><span class="detail-label">Model:</span><span id="det-model" class="detail-value" style="color:#00d2ff;">-</span></div>
      <div class="detail-row"><span class="detail-label">Reg:</span><span id="det-reg" class="detail-value" style="color:#ffffff;">-</span></div>
      <div class="detail-row"><span class="detail-label">Status:</span><span id="det-status" class="detail-value">-</span></div>
      <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
      <div class="detail-row"><span class="detail-label">Altitude:</span><span id="det-alt" class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">Speed:</span><span id="det-speed" class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">Heading:</span><span id="det-track" class="detail-value">-</span></div>
      <div class="detail-row"><span class="detail-label">Vert Rate:</span><span id="det-vrate" class="detail-value">-</span></div>
    </div>
  </div>
    
  <button id="compass-btn" class="control-btn" onclick="resetToNorth()">北を上に</button>
  <button id="topview-btn" class="control-btn" onclick="setViewToTop()">真上から</button>
  <button id="yyc-btn" class="control-btn" onclick="toggleYycLock()">YYC</button>

  <div id="control-panel">
    <div class="panel-header" onclick="togglePanel()">
      <span>📡 RADAR CONTROL</span>
      <span id="toggle-btn" class="toggle-icon">▲</span>
    </div>
    
    <div class="panel-content">
      <div class="panel-section">
        <label>📐 Line Thickness: <span id="width-val"></span></label>
        <input type="range" id="width-slider" min="1" max="5" step="1" oninput="updateLineWidth(this.value)">
      </div>

      <div class="panel-section">
        <label>🌐 Control Zone: <span id="airspace-opacity-val">0</span>%</label>
        <input type="range" id="airspace-opacity-slider" min="0" max="30" step="5" value="0" oninput="updateAirspaceOpacity(this.value)">
      </div>
      
      <div class="panel-section">
        <label>🛬 Approch Path</label>
        <div class="btn-group">
          <button id="btn-rwy-17R" class="btn rwy-btn" onclick="toggleRunway('17R')">17R</button>
          <button id="btn-rwy-17L" class="btn rwy-btn" onclick="toggleRunway('17L')">17L</button>
          <button id="btn-rwy-11" class="btn rwy-btn" onclick="toggleRunway('11')">11</button>
          <button id="btn-rwy-35L" class="btn rwy-btn" onclick="toggleRunway('35L')">35L</button>
          <button id="btn-rwy-35R" class="btn rwy-btn" onclick="toggleRunway('35R')">35R</button>
          <button id="btn-rwy-29" class="btn rwy-btn" onclick="toggleRunway('29')">29</button>
        </div>
      </div>

      <div class="panel-section">
        <label>⛰️ Alt Exaggeration: <span id="exag-val">4</span>X</label>
        <input type="range" id="exag-slider" min="0" max="8" step="1" value="4" oninput="updateExaggeration(this.value)">
      </div>

      <div class="panel-section">
        <label>🗺️ Map Style</label>
        <div class="btn-group">
          <button id="style-cyber" class="btn" onclick="switchMapStyle('cyber')">Cyber</button>
          <button id="style-backdrop" class="btn active" onclick="switchMapStyle('backdrop')">Backdrop</button>
          <button id="style-satellite" class="btn" onclick="switchMapStyle('satellite')">Satellite</button>
        </div>
      </div>
      
      <div class="panel-section">
        <label>🔄 Display Mode</label>
        <div class="btn-group">
          <button id="btn-mode-live" class="btn active" onclick="switchViewMode('live')">Live<br>Traffic</button>
          <button id="btn-mode-rt" class="btn" onclick="switchViewMode('realtime')">Current<br>Log</button>
          <button id="btn-mode-arch" class="btn" onclick="switchViewMode('archive')">Saved<br>Log</button>
        </div>
      </div>

      <div class="panel-section" id="archive-select-section" style="display: none;">
        <label>📁 Select Saved Arh</label>
        <select id="archive-list" onchange="loadSelectedArchive(this.value)">
          <option value="">-- Select Archive --</option>
        </select>
      </div>

      <div class="panel-section" style="padding-bottom: 0; border-bottom: none;">
        <button id="save-snapshot-btn" class="btn save-btn" onclick="saveCurrentTimespan()">Save This Time Span</button>
      </div>
    </div>
  </div>

  <div id="bottom-timeline-panel">
    <div class="slider-wrapper">
      <div id="timespan-range-slider"></div>
    </div>
    
    <div class="timeline-edges">
      <span id="label-left-time">-24h</span>
      <span id="label-right-time">now</span>
    </div>
  </div>

  <div id="map"></div>

  <script>
    const YYC_CENTER = [-114.0078, 51.1139];
    let EXAGGERATION_FACTOR = 4.0;
    let AIRSPACE_OPACITY = 0.0; 

    let YYC_RUNWAYS = [
      { id: '11',  center: [-114.03646743029697, 51.126731789097676], heading: 120.142261, active: false, color: [0, 255, 0] },
      { id: '29',  center: [-114.0063297003938, 51.11574234044246], heading: 360-59.857738, active: false, color: [0, 255, 0] },
      { id: '17R', center: [-114.02133463605998, 51.13139889952143], heading: 180, active: false, color: [0, 255, 0] },
      { id: '35L', center: [-114.0213797307343, 51.09665392784393], heading: 0, active: false, color: [0, 255, 0] },
      { id: '17L', center: [-113.9903239279564, 51.1485966715133], heading: 180, active: false, color: [0, 255, 0] },
      { id: '35R', center: [-113.99037210622825, 51.110237118893124], heading: 0, active: false, color: [0, 255, 0] }
    ];

    const currentHost = window.location.hostname;
    const IS_LOCAL_MODE = !currentHost ||
                          currentHost === 'localhost' ||
                          currentHost === '127.0.0.1' ||
                          currentHost === '192.168.1.99' ||
                          currentHost === '192.168.1.124' ||
                          currentHost.includes('trycloudflare.com');

    let HTTP_BASE = IS_LOCAL_MODE ? 'http://192.168.1.124:8060' : '';
    let WS_BASE   = IS_LOCAL_MODE ? 'ws://192.168.1.124:8060' : '';
    let ws = null; 

    const STYLES = {
      cyber: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
      backdrop: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      satellite: {
        version: 8,
        sources: {
          'esri-satellite': {
            type: 'raster',
            tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
            tileSize: 256,
            attribution: 'Tiles &copy; Esri'
          }
        },
        layers: [
          { id: 'esri-satellite-layer', type: 'raster', source: 'esri-satellite', minzoom: 0, maxzoom: 20 }
        ]
      }
    };

    let currentStyleName = 'backdrop'; 
    let currentLineWidth = 1; 
    let sliderStartHours = -12.0; 
    let sliderEndHours = 0.0; 
    const MASTER_START_HOURS = sliderStartHours;

    let viewMode = 'live'; 
    let currentArchiveData = []; 
    
    let liveFlightPaths = {};     
    let archiveFlightPaths = {};  
    let flightPaths = liveFlightPaths; 

    let selectedAircraftId = null;

    document.addEventListener("DOMContentLoaded", () => {
      const widthSlider = document.getElementById('width-slider');
      const widthVal = document.getElementById('width-val');
      if (widthSlider && widthVal) {
        widthSlider.value = currentLineWidth;
        widthVal.innerText = currentLineWidth;
      }
    });

    function formatToCalgaryTime(timestamp) {
      if (timestamp < 10000000000) timestamp *= 1000;
      const date = new Date(timestamp);
      const utc = date.getTime() + (date.getTimezoneOffset() * 60000);
      const month = date.getUTCMonth() + 1;
      const calgaryOffsetHours = (month >= 3 && month <= 11) ? -6 : -7;
      const calgaryDate = new Date(utc + (3600000 * calgaryOffsetHours));
      
      const hh = String(calgaryDate.getHours()).padStart(2, '0');
      const mm = String(calgaryDate.getMinutes()).padStart(2, '0');
      const ss = String(calgaryDate.getSeconds()).padStart(2, '0');
      
      return `${hh}:${mm}:${ss}`;
    }

    const rangeSlider = document.getElementById('timespan-range-slider');
    noUiSlider.create(rangeSlider, {
        start: [sliderStartHours, sliderEndHours], 
        connect: true,
        step: 0.25, 
        tooltips: [true, true], 
        range: { 'min': -24, 'max': 0 },
        format: {
            to: function (value) {
                let baseTime = Date.now();
                if (viewMode === 'archive' && currentArchiveData.length > 0) {
                    baseTime = Math.max(...currentArchiveData.map(d => d.ts));
                    if (baseTime < 10000000000) baseTime *= 1000;
                }
                const timeStamp = baseTime + (value * 60 * 60 * 1000);
                return formatToCalgaryTime(timeStamp);
            },
            from: function (value) { return Number(value); }
        }
    });

    rangeSlider.noUiSlider.on('update', function (values, handle, unencoded) {
        sliderStartHours = parseFloat(unencoded[0]);
        sliderEndHours = parseFloat(unencoded[1]);
        updateAbsoluteTimeLabels();
    });

    function updateAbsoluteTimeLabels() {
      if (!rangeSlider || !rangeSlider.noUiSlider) return;

      let baseTime = Date.now();
      if (viewMode === 'archive' && currentArchiveData.length > 0) {
        baseTime = Math.max(...currentArchiveData.map(d => d.ts));
        if (baseTime < 10000000000) baseTime *= 1000;
      }

      const leftEdgeTimeStamp = baseTime - (24 * 60 * 60 * 1000);

      let rightLabelText = "";
      if (viewMode === 'live' || viewMode === 'realtime') {
        rightLabelText = `Now: ${formatToCalgaryTime(baseTime)}`;
      } else {
        const d = new Date(baseTime);
        const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
        const monthForOffset = d.getUTCMonth() + 1;
        const calgaryOffsetHours = (monthForOffset >= 3 && monthForOffset <= 11) ? -6 : -7;
        const calvaryDate = new Date(utc + (3600000 * calgaryOffsetHours));

        const yyyy = calvaryDate.getFullYear();                         
        const mm = String(calvaryDate.getMonth() + 1).padStart(2, '0'); 
        const dd = String(calvaryDate.getDate()).padStart(2, '0');    
        
        rightLabelText = `${yyyy}/${mm}/${dd} ${formatToCalgaryTime(baseTime)}`;
      }

      document.getElementById('label-left-time').innerText = `-24h: ${formatToCalgaryTime(leftEdgeTimeStamp)}`;
      document.getElementById('label-right-time').innerText = rightLabelText;
    }

    let panelTimeout = null;
    const AUTO_COLLAPSE_DELAY = 5000;

    function resetPanelTimer() {
      clearTimeout(panelTimeout);
      const panel = document.getElementById('control-panel');
      if (panel.classList.contains('collapsed')) return;
      panelTimeout = setTimeout(() => { panel.classList.add('collapsed'); }, AUTO_COLLAPSE_DELAY);
    }

    function togglePanel() {
      const panel = document.getElementById('control-panel');
      panel.classList.toggle('collapsed');
      if (!panel.classList.contains('collapsed')) { resetPanelTimer(); } else { clearTimeout(panelTimeout); }
    }

    let map; 

    document.addEventListener("DOMContentLoaded", async () => {
      if (!IS_LOCAL_MODE) {
        try {
          console.log("🌐 External Mode: Fetching dynamic endpoint from ./url.json...");
          const res = await fetch('./url.json'); 
          const config = await res.json();
          if (config.url) {
            const cleanUrl = config.url.replace(/\/$/, "");
            HTTP_BASE = cleanUrl;
            WS_BASE = cleanUrl.replace(/^http/, "ws");
            console.log(`✅ Endpoints updated: HTTP -> ${HTTP_BASE}, WS -> ${WS_BASE}`);
          }
        } catch (e) {
          console.error("❌ Failed to load url.json. Falling back to relative routing.", e);
          HTTP_BASE = window.location.origin;
          WS_BASE = window.location.origin.replace(/^http/, "ws");
        }
      } else {
        console.log(`🏠 Local Mode: Connected directly to ${HTTP_BASE}`);
      }

      initWebSocket();

      map = new maplibregl.Map({
          container: 'map',
          style: STYLES[currentStyleName],
          center: YYC_CENTER,
          zoom: 8,
          bearing: 0,
          pitch: 0,
          maxPitch: 85
      });

      const panel = document.getElementById('control-panel');
      ['mousemove', 'click', 'input'].forEach(eventType => {
        panel.addEventListener(eventType, () => { resetPanelTimer(); });
      });

      resetPanelTimer();

      map.on('load', async () => {
          applyStyleSettings();
          switchViewMode(viewMode);
          
          await loadInitialHistoricalData();
          await loadArchiveList(); 
          
          map.addControl(deckOverlay);

      });
    });

    function initWebSocket() {
      if (!WS_BASE) {
        console.warn("⚠️ WS_BASE is not defined yet. Skipping WebSocket initialization.");
        return;
      }
      console.log(`🔌 Connecting to WebSocket: ${WS_BASE}/ws`);
      ws = new WebSocket(`${WS_BASE}/ws`);
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        processIncomingMessageToTarget(msg, liveFlightPaths);
      };
      ws.onclose = () => {
        console.log("⚠️ WebSocket closed. Reconnecting in 5s...");
        setTimeout(initWebSocket, 5000);
      };
      ws.onerror = (err) => {
        console.error("❌ WebSocket error:", err);
      };
    }

    function toggleYycLock() {
      map.easeTo({ center: YYC_CENTER, duration: 800, cubicBezier: [0.25, 1, 0.5, 1], essential: true });
    }

    function applyStyleSettings() {
      if (!map.getSource('aws-terrain')) {
        map.addSource('aws-terrain', {
          type: 'raster-dem',
          tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
          encoding: 'terrarium',
          tileSize: 256,
          maxzoom: 15
        });
      }
      map.setTerrain({ source: 'aws-terrain', exaggeration: EXAGGERATION_FACTOR });
    }

    function switchMapStyle(styleName) {
      if (currentStyleName === styleName) return;
      currentStyleName = styleName;
      ['cyber', 'backdrop', 'satellite'].forEach(name => {
        document.getElementById(`style-${name}`).classList.toggle('active', name === styleName);
      });
      map.setStyle(STYLES[styleName]);
      map.once('styledata', () => { applyStyleSettings(); });
    }

    const deckOverlay = new deck.MapboxOverlay({ 
      layers: [],
      onClick: (info) => { if (!info.object) { closeDetailPanel(); } }
    });

    function getColorByAltitude(rawAlt) {
      let currentMinAlt = 0; 
      let currentMaxAlt = 9000; 
      const ratio = Math.min(Math.max((rawAlt - currentMinAlt) / (currentMaxAlt - currentMinAlt), 0), 1);
      return [
        Math.round(255 * (1 - ratio)),
        Math.round(200 * (1 - Math.abs(ratio - 0.5) * 2)),
        Math.round(255 * ratio),
        224
      ];
    }

    function generateApproachLine(rwy, exag) {
      const startLon = rwy.center[0];
      const startLat = rwy.center[1];
      const airportElevationMeters = 1084+60; 
      const reverseHeadingRad = ((rwy.heading + 180) % 360) * Math.PI / 180;
      const distanceMeters = 10*1852; 
      const glideSlopeClimbMeters = distanceMeters * Math.sin(3 * Math.PI / 180);
      const finalAltitudeMeters = airportElevationMeters + glideSlopeClimbMeters;

      const latLengthPerDegree = 111320;
      const lonLengthPerDegree = 40075000 * Math.cos(startLat * Math.PI / 180) / 360;

      const endLon = startLon + (Math.sin(reverseHeadingRad) * distanceMeters / lonLengthPerDegree);
      const endLat = startLat + (Math.cos(reverseHeadingRad) * distanceMeters / latLengthPerDegree);

      return [
        [startLon, startLat, airportElevationMeters * exag],
        [endLon, endLat, finalAltitudeMeters * exag]
      ];
    }

    function toggleRunway(id) {
      const rwy = YYC_RUNWAYS.find(r => r.id === id);
      if (rwy) {
        rwy.active = !rwy.active;
        document.getElementById(`btn-rwy-${id}`).classList.toggle('active', rwy.active);
        YYC_RUNWAYS = [...YYC_RUNWAYS]; 
      }
    }

    const YYC_CONTROL_ZONE = [
      { name: "Control Zone", radius: 5*1852, rawElevation: 1084, rawCeiling: 3000*0.3048, color: [0, 118, 255] },
      { name: "TCA Inner", radius: 15*1852, rawElevation: 4800*0.3048, rawCeiling: (12500-4800)*0.3048, color: [230, 50, 50] },
      { name: "TCA Middle", radius: 20*1852, rawElevation: 5500*0.3048, rawCeiling: (12500-5500)*0.3048, color: [230, 120, 50] },
      { name: "TCA Outer", radius: 30*1852, rawElevation: 8000*0.3048, rawCeiling: (12500-8000)*0.3048, color: [230, 200, 50] }
    ];

    function generateAirspaceCircle(center, radiusMeters, rawElevation, pointsCount = 64) {
      const coordinates = [];
      const km = radiusMeters / 1000;
      const latFactor = km / 111.32;
      const lonFactor = km / (40075 * Math.cos(center[1] * Math.PI / 180) / 360);

      for (let i = 0; i < pointsCount; i++) {
        const angle = (i / pointsCount) * Math.PI * 2;
        const lon = center[0] + Math.cos(angle) * lonFactor;
        const lat = center[1] + Math.sin(angle) * latFactor;
        coordinates.push([lon, lat, rawElevation]);
      }
      coordinates.push([coordinates[0][0], coordinates[0][1], rawElevation]); 
      return coordinates;
    }

    async function loadInitialHistoricalData() {
      if (!HTTP_BASE) return;
      try {
        console.log(`⏳ Loading 24 hours of history from server...`);
        const response = await fetch(`${HTTP_BASE}/api/history?hours=24`);
        const data = await response.json();
        
        liveFlightPaths = {};
        data.forEach(msg => { 
          processIncomingMessageToTarget(msg, liveFlightPaths); 
        });
        console.log(`✅ History loaded. Total unique aircrafts: ${Object.keys(liveFlightPaths).length}`);
        
        if(viewMode === 'live' || viewMode === 'realtime') {
          flightPaths = liveFlightPaths;
        }
      } catch (e) {
        console.error("❌ Failed to load historical data:", e);
      }
    }

    function processIncomingMessageToTarget(msg, targetObject) {
      if (!targetObject[msg.id]) {
        targetObject[msg.id] = {
          id: msg.id, callsign: 'UNKNOWN', airline: 'UNKNOWN', model: 'UNKNOWN',
          registration: '---', speed: '---', track: '---', v_rate: '---', segments: [[]] 
        };
      }

      const aircraft = targetObject[msg.id];

      if (msg.airline) aircraft.airline = msg.airline;
      if (msg.model) aircraft.model = msg.model;
      if (msg.registration) aircraft.registration = msg.registration;
      if (msg.callsign) aircraft.callsign = msg.callsign;
      if (msg.speed !== undefined) aircraft.speed = Math.round(msg.speed) + " kt";
      if (msg.track !== undefined) aircraft.track = Math.round(msg.track) + "°";
      if (msg.v_rate !== undefined) {
        aircraft.v_rate = (msg.v_rate > 0 ? "+" : "") + msg.v_rate + " ft/min";
      }

      if (msg.lat !== undefined && msg.lon !== undefined) {
        const altInMeters = msg.alt * 0.3048;
        let adjustedAlt = altInMeters * EXAGGERATION_FACTOR; 
        const newCoord = [msg.lon, msg.lat, adjustedAlt];
              
        let correctTs = Number(msg.ts);
        if (correctTs < 10000000000) correctTs *= 1000;

        let currentSegment = aircraft.segments[aircraft.segments.length - 1];
        if (!currentSegment) {
          aircraft.segments = [[]];
          currentSegment = aircraft.segments[0];
        }
        
        if (currentSegment.length === 0) {
          currentSegment.push({ pos: newCoord, rawAlt: msg.alt, time: correctTs });
        } else {
          const lastPoint = currentSegment[currentSegment.length - 1];
          if ((correctTs - lastPoint.time) > 1800 * 1000) {
            aircraft.segments.push([]);
            currentSegment = aircraft.segments[aircraft.segments.length - 1];
            currentSegment.push({ pos: newCoord, rawAlt: msg.alt, time: correctTs });
          } else {
            if (lastPoint.pos[0] !== msg.lon || lastPoint.pos[1] !== msg.lat) {
              currentSegment.push({ pos: newCoord, rawAlt: msg.alt, time: correctTs });
            }
          }
        }
      }

      if (selectedAircraftId === msg.id && flightPaths === targetObject) {
        updateDetailPanel(msg.id);
      }
    }

    function switchViewMode(mode) {
      viewMode = mode;
      
      document.getElementById('btn-mode-live').classList.toggle('active', mode === 'live');
      document.getElementById('btn-mode-rt').classList.toggle('active', mode === 'realtime');
      document.getElementById('btn-mode-arch').classList.toggle('active', mode === 'archive');
      
      document.getElementById('archive-select-section').style.display = (mode === 'archive') ? 'block' : 'none';
      document.getElementById('save-snapshot-btn').style.display = (mode === 'realtime') ? 'block' : 'none';

      const timelinePanel = document.getElementById('bottom-timeline-panel');
      if (mode === 'live') {
        timelinePanel.classList.add('hidden');
      } else {
        timelinePanel.classList.remove('hidden');
      }

      closeDetailPanel();
      
      if (mode === 'realtime' || mode === 'live') { 
        flightPaths = liveFlightPaths; 
        sliderStartHours = MASTER_START_HOURS;
        sliderEndHours = 0.0;

        rangeSlider.noUiSlider.updateOptions({
          range: { 'min': -24, 'max': 0 },
          padding: [0, 0],
          start: [sliderStartHours, sliderEndHours] 
        });
        updateAbsoluteTimeLabels();
      } else {
        archiveFlightPaths = {};
        flightPaths = archiveFlightPaths;
        currentArchiveData = [];
        deckOverlay.setProps({ layers: [] });
        rangeSlider.noUiSlider.updateOptions({
          range: { 'min': -24, 'max': 0 },
          padding: [0, 0],
          start: [0, 0]
        });
        sliderStartHours = 0.0;
        sliderEndHours = 0.0;
        updateAbsoluteTimeLabels();
      }
    }
    
    async function saveCurrentTimespan() {
      if (viewMode !== 'realtime' || !HTTP_BASE) return;
      
      let baseTime = Date.now();
      const startTimeStr = formatToCalgaryTime(baseTime + (sliderStartHours * 60 * 60 * 1000));
      const endTimeStr = formatToCalgaryTime(baseTime + (sliderEndHours * 60 * 60 * 1000));

      const confirmSave = confirm(`カルガリー時間 [ ${startTimeStr} 〜 ${endTimeStr} ] のスパンをサーバーに保存しますか？`);
      if (!confirmSave) return;

      try {
        const response = await fetch(`${HTTP_BASE}/api/archive/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start_hours: sliderStartHours, end_hours: sliderEndHours })
        });
        const resData = await response.json();
        if (resData.status === 'success') {
          alert(`✅ 保存に成功しました！\nファイル名: ${resData.filename}`);
          loadArchiveList(); 
        } else {
          alert(`❌ 保存失敗: ${resData.message}`);
        }
      } catch (e) {
        alert(`❌ サーバー接続エラー: ${e}`);
      }
    }

    async function loadArchiveList() {
      if (!HTTP_BASE) return;
      try {
        const response = await fetch(`${HTTP_BASE}/api/archive/list`);
        const list = await response.json();
        const select = document.getElementById('archive-list');
        
        select.innerHTML = '<option value="">-- アーカイブを選択 --</option>';
        list.forEach(filename => {
          const option = document.createElement('option');
          option.value = filename;
          option.innerText = filename.replace('archive_', '').replace('.json', '');
          select.appendChild(option);
        });
      } catch (e) {
        console.error("❌ アーカイブ一覧の取得に失敗しました:", e);
      }
    }

    async function loadSelectedArchive(filename) {
      if (!filename || !HTTP_BASE) return;
      try {
        console.log(`⏳ Loading archive file: ${filename}...`);
        const response = await fetch(`${HTTP_BASE}/api/archive/download?filename=${filename}`);
        currentArchiveData = await response.json();
        
        archiveFlightPaths = {}; 
        currentArchiveData.forEach(msg => { 
          processIncomingMessageToTarget(msg, archiveFlightPaths); 
        });
        flightPaths = archiveFlightPaths; 
        console.log(`✅ Archive parsed. Total paths: ${Object.keys(flightPaths).length}`);
        
        if (currentArchiveData.length > 0) {
          const timestamps = currentArchiveData.map(d => d.ts);
          let maxTs = Math.max(...timestamps);
          if (maxTs < 10000000000) maxTs *= 1000;
          let minTs = Math.min(...timestamps);
          if (minTs < 10000000000) minTs *= 1000;
          
          const durationHours = (maxTs - minTs) / (1000 * 60 * 60);
          const forbiddenHours = Math.max(24.0 - durationHours, 0);
          const safeStartPos = -Math.min(Math.max(durationHours, 0.1666), 24.0);

          rangeSlider.noUiSlider.updateOptions({
            range: { 'min': -24, 'max': 0 },
            padding: [forbiddenHours, 0],
            start: [safeStartPos, 0]
          });
          sliderStartHours = safeStartPos;
          sliderEndHours = 0.0;
        }
        
        updateAbsoluteTimeLabels();
      } catch (e) {
        console.error("❌ 過去ログの読み込みに失敗しました:", e);
      }
    }

    setInterval(() => {
      let baseTime = Date.now();
      
      if (viewMode === 'archive') {
        if (currentArchiveData.length === 0) return;
        let maxTs = Math.max(...currentArchiveData.map(d => d.ts));
        if (maxTs < 10000000000) maxTs *= 1000;
        baseTime = maxTs;
      } else {
        updateAbsoluteTimeLabels();

        if (rangeSlider && rangeSlider.noUiSlider) {
          const currentValues = rangeSlider.noUiSlider.get(true);
          sliderStartHours = currentValues[0];
          sliderEndHours = currentValues[1];
        }

        const tooltips = rangeSlider.querySelectorAll('.noUi-tooltip');
        if (tooltips.length === 2) {
          const startTimeStamp = baseTime + (sliderStartHours * 60 * 60 * 1000);
          const endTimeStamp = baseTime + (sliderEndHours * 60 * 60 * 1000);
          tooltips[0].innerText = formatToCalgaryTime(startTimeStamp);
          tooltips[1].innerText = formatToCalgaryTime(endTimeStamp);
        }
      }

      const timeLimitStart = (viewMode === 'live') ? (baseTime - 24 * 60 * 60 * 1000) : (baseTime + (sliderStartHours * 60 * 60 * 1000));
      const timeLimitEnd = (viewMode === 'live') ? (baseTime + 10 * 1000) : (baseTime + (sliderEndHours * 60 * 60 * 1000));

      let activePathsArray = [];
      let currentPositionsArray = []; 

      for (const id in liveFlightPaths) {
        liveFlightPaths[id].segments = liveFlightPaths[id].segments.map(segment => {
          return segment.filter(pt => (Date.now() - pt.time) < (24 * 60 * 60 * 1000));
        }).filter(segment => segment.length > 0);
        
        if (liveFlightPaths[id].segments.length === 0) {
          delete liveFlightPaths[id];
        }
      }

      for (const id in flightPaths) {
        const aircraft = flightPaths[id];

        let lastPt = null;
        if (aircraft.segments.length > 0) {
          for (let i = aircraft.segments.length - 1; i >= 0; i--) {
            const seg = aircraft.segments[i];
            if (seg && seg.length > 0) {
              lastPt = seg[seg.length - 1];
              break;
            }
          }
        }

        if (viewMode === 'live') {
          if (!lastPt || (Date.now() - lastPt.time) > 180 * 1000) {
            continue; 
          }
          
          const lon = Number(lastPt.pos[0]);
          const lat = Number(lastPt.pos[1]);
          const rawAlt = (lastPt.rawAlt !== undefined && !isNaN(lastPt.rawAlt)) ? Number(lastPt.rawAlt) : 0;
          
          if (!isNaN(lon) && !isNaN(lat)) {
            const headingAngle = aircraft.track ? parseFloat(aircraft.track) : 0;
            currentPositionsArray.push({
              id: id,
              pos: [lon, lat, rawAlt * EXAGGERATION_FACTOR], 
              rawAlt: rawAlt, 
              angle: isNaN(headingAngle) ? 0 : headingAngle   
            });
          }

          const latestSegment = aircraft.segments[aircraft.segments.length - 1];
          if (latestSegment) {
            const displayPoints = latestSegment.filter(pt => pt.time >= timeLimitStart && pt.time <= timeLimitEnd);
            if (displayPoints.length > 1) {
              activePathsArray.push({
                id: id,
                path: displayPoints.map(pt => [pt.pos[0], pt.pos[1], pt.rawAlt * EXAGGERATION_FACTOR]),
                rawAltitudes: displayPoints.map(pt => pt.rawAlt)
              });
            }
          }
        } 
        else {
          aircraft.segments.forEach(segment => {
            const displayPoints = segment.filter(pt => pt.time >= timeLimitStart && pt.time <= timeLimitEnd);

            if (displayPoints.length > 1) {
              activePathsArray.push({
                id: id,
                path: displayPoints.map(pt => [pt.pos[0], pt.pos[1], pt.rawAlt * EXAGGERATION_FACTOR]),
                rawAltitudes: displayPoints.map(pt => pt.rawAlt)
              });
            }
          });
        }
      }

      const airspaceData = (typeof YYC_CONTROL_ZONE !== 'undefined') ? YYC_CONTROL_ZONE : [];
      const airspaceLayer = new deck.PolygonLayer({
        id: 'yyc-airspace-layer',
        data: airspaceData,
        getPolygon: d => generateAirspaceCircle(YYC_CENTER, d.radius, d.rawElevation * EXAGGERATION_FACTOR),
        coordinateSystem: deck.COORDINATE_SYSTEM.LNGLAT, 
        extruded: true,                                    
        getElevation: d => d.rawCeiling * EXAGGERATION_FACTOR, 
        getFillColor: d => [...d.color, Math.round(AIRSPACE_OPACITY * 255)],          
        getLineColor: d => [...d.color, Math.round(AIRSPACE_OPACITY * 1.5 * 255)],         
        getLineWidth: 2,
        wireframe: true,                                  
        pickable: false,
        _lighting: 'flat', 
        parameters: { depthTest: true, blend: true, cull: false },
        updateTriggers: {
          getPolygon: [EXAGGERATION_FACTOR],     
          getElevation: [EXAGGERATION_FACTOR],
          getFillColor: [AIRSPACE_OPACITY], 
          getLineColor: [AIRSPACE_OPACITY]
        }
      });

      const pathLayer = new deck.PathLayer({
        id: 'flight-paths-layer',
        data: activePathsArray,
        getPath: d => d.path,
        getColor: d => d.rawAltitudes.map(rawAlt => getColorByAltitude(rawAlt)),
        widthUnits: 'pixels',     
        getWidth: d => d.id === selectedAircraftId ? ((currentLineWidth - 0.3) * 2) : ((currentLineWidth - 0.3) * 1.0),      
        widthMinPixels: 0.5,
        jointRounded: true,
        capRounded: true,
        pickable: true,
        pickRadius: 30, 
        parameters: { depthTest: true, depthMask: true },
        onClick: info => {
          if (info.object) {
            selectedAircraftId = info.object.id; 
            updateDetailPanel(info.object.id);   
          }
        },
        extensions: [new deck.PathStyleExtension({ highPrecisionDash: true })],
        getDashArray: [0, 0], 
        billboard: true,      
        miterLimit: 2,
        updateTriggers: {
          getPath: [activePathsArray],
          getColor: [activePathsArray], 
          getWidth: [selectedAircraftId, currentLineWidth]
        }
      });

      const markerLayer = new deck.ScatterplotLayer({
        id: 'aircraft-3d-marker-layer',
        data: currentPositionsArray,
        coordinateSystem: deck.COORDINATE_SYSTEM.LNGLAT,
        getPosition: d => d.pos, 
        radiusUnits: 'pixels',
        getRadius: d => d.id === selectedAircraftId ? (currentLineWidth * 6) : (currentLineWidth * 3), 
        billboard: true, 
        stroked: true,
        filled: true,
        getFillColor: d => getColorByAltitude(d.rawAlt),
        getLineColor: [255, 255, 255, 255], 
        getLineWidth: d => d.id === selectedAircraftId ? 3 : 1.5, 
        lineWidthUnits: 'pixels',
        pickable: true,
        parameters: { depthTest: false, depthMask: false, blend: true },
        onClick: info => {
          if (info.object) {
            selectedAircraftId = info.object.id; 
            updateDetailPanel(info.object.id);   
          }
        },
        updateTriggers: {
          getPosition: [currentPositionsArray], 
          getRadius: [selectedAircraftId, currentLineWidth], 
          getLineWidth: [selectedAircraftId]
        }
      });

      const activeRunwaysData = YYC_RUNWAYS.filter(rwy => rwy.active);
      
      const runwayLayer = new deck.PathLayer({
        id: 'yyc-runway-approach-layer',
        data: activeRunwaysData,
        getPath: d => generateApproachLine(d, EXAGGERATION_FACTOR), 
        getColor: d => [...d.color, 154], 
        widthUnits: 'meters',
        getWidth: 200,
        jointRounded: true,
        capRounded: true,
        pickable: false,
        parameters: { depthTest: false, depthMask: false },
        updateTriggers: {
          getPath: [EXAGGERATION_FACTOR]
        }
      });

      if (typeof deckOverlay !== 'undefined') {
        deckOverlay.setProps({ 
          layers: [pathLayer, airspaceLayer, markerLayer, runwayLayer] 
        });
      }

    }, 1000);

    function updateLineWidth(val) {
      currentLineWidth = parseFloat(val);
      document.getElementById('width-val').innerText = val;
      if (typeof deckOverlay !== 'undefined') { deckOverlay.setProps({}); }
    }

    function updateExaggeration(val) {
      EXAGGERATION_FACTOR = parseInt(val);
      document.getElementById('exag-val').innerText = val;
      if (map.getSource('aws-terrain')) {
        map.setTerrain({ source: 'aws-terrain', exaggeration: EXAGGERATION_FACTOR });
      }
    }

    function updateAirspaceOpacity(val) {
      AIRSPACE_OPACITY = parseInt(val) / 100; 
      document.getElementById('airspace-opacity-val').innerText = val;
    }

    function resetToNorth() {
      const currentZoom = map.getZoom();
      const currentPitch = map.getPitch();
      map.easeTo({ bearing: 0, pitch: currentPitch, zoom: currentZoom, duration: 800, cubicBezier: [0.25, 1, 0.5, 1] });
    }

    function setViewToTop() {
      const currentZoom = map.getZoom();
      const currentBearing = map.getBearing();
      map.easeTo({ pitch: 0, bearing: currentBearing, zoom: currentZoom, duration: 800, cubicBezier: [0.25, 1, 0.5, 1] });
    }
  
    function updateDetailPanel(hexId) {
      const aircraft = flightPaths[hexId];
      if (!aircraft) return;

      document.getElementById('det-hex').innerText = hexId.toUpperCase();
      document.getElementById('det-callsign').innerText = aircraft.callsign;
      document.getElementById('det-airline').innerText = aircraft.airline;
      document.getElementById('det-model').innerText = aircraft.model;
      document.getElementById('det-reg').innerText = aircraft.registration;
      
      const segments = aircraft.segments;
      const lastSegment = segments && segments.length > 0 ? segments[segments.length - 1] : null;

      if (lastSegment && lastSegment.length > 0) {
        const lastPt = lastSegment[lastSegment.length - 1];
        const altFt = Math.round(lastPt.rawAlt / 0.3048); 
        document.getElementById('det-alt').innerText = altFt.toLocaleString() + " ft";
        
        let correctTime = lastPt.time;
        const isLost = (Date.now() - correctTime) > 30000;
        const statusEl = document.getElementById('det-status');
        
        if (viewMode === 'archive') {
          statusEl.innerText = "📁 ARCHIVE";
          statusEl.className = "detail-value";
        } else {
          statusEl.innerText = isLost ? "🚨 LOST CONTACT" : "🟢 ACTIVE";
          statusEl.className = isLost ? "detail-value status-lost" : "detail-value status-active";
        }
      } else {
        document.getElementById('det-alt').innerText = "---";
      }

      document.getElementById('det-speed').innerText = aircraft.speed;
      document.getElementById('det-track').innerText = aircraft.track;
      document.getElementById('det-vrate').innerText = aircraft.v_rate;

      document.getElementById('detail-panel').style.display = 'block';
    }

    function closeDetailPanel() {
      selectedAircraftId = null; 
      document.getElementById('detail-panel').style.display = 'none';
    }
  </script>
